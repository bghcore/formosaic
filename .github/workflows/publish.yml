name: Publish

on:
  push:
    branches: [main]
    tags:
      - "v*"
      - "core-v*"
      - "fluent-v*"
      - "mui-v*"
      - "headless-v*"
      - "antd-v*"
      - "chakra-v*"
      - "mantine-v*"
      - "atlaskit-v*"
      - "base-web-v*"
      - "heroui-v*"
      - "designer-v*"
      - "radix-v*"
      - "react-aria-v*"
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish (or "all" for all changed)
        required: true
        type: choice
        options:
          - all
          - core
          - fluent
          - mui
          - headless
          - antd
          - chakra
          - mantine
          - atlaskit
          - base-web
          - heroui
          - designer
          - radix
          - react-aria
      dry-run:
        description: Dry run (skip actual publish)
        required: false
        type: boolean
        default: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Detect packages to publish
        id: detect
        run: |
          PKGS=("core" "fluent" "mui" "headless" "antd" "chakra" "mantine" "atlaskit" "base-web" "heroui" "radix" "react-aria" "designer")

          # For tag pushes, determine from tag
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            if [[ "$TAG" == v* ]]; then
              echo 'packages=["core","fluent","mui","headless","antd","chakra","mantine","atlaskit","base-web","heroui","radix","react-aria","designer"]' >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == core-v* ]]; then
              echo 'packages=["core"]' >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == fluent-v* ]]; then
              echo 'packages=["fluent"]' >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == mui-v* ]]; then
              echo 'packages=["mui"]' >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == headless-v* ]]; then
              echo 'packages=["headless"]' >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == antd-v* ]]; then
              echo 'packages=["antd"]' >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == chakra-v* ]]; then
              echo 'packages=["chakra"]' >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == mantine-v* ]]; then
              echo 'packages=["mantine"]' >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == atlaskit-v* ]]; then
              echo 'packages=["atlaskit"]' >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == base-web-v* ]]; then
              echo 'packages=["base-web"]' >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == heroui-v* ]]; then
              echo 'packages=["heroui"]' >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == designer-v* ]]; then
              echo 'packages=["designer"]' >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == radix-v* ]]; then
              echo 'packages=["radix"]' >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == react-aria-v* ]]; then
              echo 'packages=["react-aria"]' >> "$GITHUB_OUTPUT"
            else
              echo "Unknown tag: $TAG"
              echo 'packages=[]' >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          # For manual dispatch with specific package
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.package }}" != "all" ]]; then
            echo 'packages=["${{ inputs.package }}"]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # For push to main or manual "all": compare local vs npm versions
          CHANGED="["
          FIRST=true
          for PKG in "${PKGS[@]}"; do
            LOCAL_VERSION=$(node -p "require('./packages/$PKG/package.json').version")
            NPM_VERSION=$(npm view "@formosaic/$PKG" version 2>/dev/null || echo "0.0.0")

            if [ "$LOCAL_VERSION" != "$NPM_VERSION" ]; then
              echo "📦 @formosaic/$PKG: $NPM_VERSION -> $LOCAL_VERSION (will publish)"
              if [ "$FIRST" = true ]; then
                CHANGED="$CHANGED\"$PKG\""
                FIRST=false
              else
                CHANGED="$CHANGED,\"$PKG\""
              fi
            else
              echo "⏭️  @formosaic/$PKG: $LOCAL_VERSION (up to date)"
            fi
          done
          CHANGED="$CHANGED]"

          echo "packages=$CHANGED" >> "$GITHUB_OUTPUT"

  build-and-test:
    needs: detect
    if: needs.detect.outputs.packages != '[]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build all packages
        run: npm run build

      - name: Run tests
        run: npm run test

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: packages/*/dist/
          retention-days: 1

  publish:
    needs: [detect, build-and-test]
    if: needs.detect.outputs.packages != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        package: ${{ fromJson(needs.detect.outputs.packages) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: packages/

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Get package info
        id: info
        run: |
          VERSION=$(node -p "require('./packages/${{ matrix.package }}/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish @formosaic/${{ matrix.package }}
        if: inputs.dry-run != true
        working-directory: packages/${{ matrix.package }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @formosaic/${{ matrix.package }} (dry run)
        if: inputs.dry-run == true
        working-directory: packages/${{ matrix.package }}
        run: npm publish --access public --dry-run

      - name: Create GitHub Release
        if: inputs.dry-run != true
        run: |
          TAG="${{ matrix.package }}-v${{ steps.info.outputs.version }}"
          gh release create "$TAG" --generate-notes --title "@formosaic/${{ matrix.package }}@${{ steps.info.outputs.version }}" 2>/dev/null || echo "Release $TAG already exists, skipping"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
