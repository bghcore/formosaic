name: Publish

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci --legacy-peer-deps

      - run: npm run build

      - name: Verify tag matches package versions
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CORE_VERSION=$(node -p "require('./packages/core/package.json').version")
          FLUENT_VERSION=$(node -p "require('./packages/fluent/package.json').version")
          MUI_VERSION=$(node -p "require('./packages/mui/package.json').version")
          if [ "$TAG_VERSION" != "$CORE_VERSION" ] || [ "$TAG_VERSION" != "$FLUENT_VERSION" ] || [ "$TAG_VERSION" != "$MUI_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package versions (core=$CORE_VERSION, fluent=$FLUENT_VERSION, mui=$MUI_VERSION)"
            exit 1
          fi

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - run: npm publish --workspace packages/core --access public --provenance

      - run: npm publish --workspace packages/fluent --access public --provenance

      - run: npm publish --workspace packages/mui --access public --provenance

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
